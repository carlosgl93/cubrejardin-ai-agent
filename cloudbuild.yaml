steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.prod
      - -t
      - gcr.io/$PROJECT_ID/whatsapp-api:latest
      - .

  # Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/whatsapp-api:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - whatsapp-api
      - --image=gcr.io/$PROJECT_ID/whatsapp-api:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60s

images:
  - gcr.io/$PROJECT_ID/whatsapp-api:latest
